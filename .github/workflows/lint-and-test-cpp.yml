name: "lint and test cpp"

on:
  workflow_call:
    inputs:
      cpp-version:
        type: string
        required: false
        default: "20"

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            clang \
            clang-tidy \
            cppcheck \
            cmake \
            ninja-build \
            pipx
          pipx install cpplint
          pipx install cmakelang
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Install sccache
        uses: mozilla-actions/sccache-action@v0.0.9

      - name: Set up Conan
        run: |
          pipx install conan
          conan profile detect --force

      - name: Install just
        uses: extractions/setup-just@v3
      
      - name: Fetch shared just recipes
        run: just fetch-tools

      - name: Cache Conan packages
        uses: actions/cache@v3
        with:
          path: ~/.conan2/p
          key: ${{ runner.os }}-conan-lint-${{ hashFiles('conanfile.py', 'conanfile.txt') }}
          restore-keys: |
            ${{ runner.os }}-conan-lint-

      - name: Run lint
        run: just lint
        env:
          SCCACHE_GHA_ENABLED: "true"
          CMAKE_C_COMPILER_LAUNCHER: sccache
          CMAKE_CXX_COMPILER_LAUNCHER: sccache

  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            g++ \
            cmake \
            ninja-build \
            pipx
          pipx install gcovr
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Install sccache
        uses: mozilla-actions/sccache-action@v0.0.9

      - name: Set up Conan
        run: |
          pip install conan
          conan profile detect --force

      - name: Install just
        uses: extractions/setup-just@v3

      - name: Fetch shared just recipes
        run: just fetch-tools

      - name: Cache Conan packages
        uses: actions/cache@v3
        with:
          path: ~/.conan2/p
          key: ${{ runner.os }}-conan-test-${{ hashFiles('conanfile.py', 'conanfile.txt') }}
          restore-keys: |
            ${{ runner.os }}-conan-test-

      - name: Run tests with coverage
        run: just test
        env:
          SCCACHE_GHA_ENABLED: "true"
          CMAKE_C_COMPILER_LAUNCHER: sccache
          CMAKE_CXX_COMPILER_LAUNCHER: sccache

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml 
          if-no-files-found: error

