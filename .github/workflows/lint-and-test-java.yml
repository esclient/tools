name: "lint and test java"

on:
  workflow_call:
    inputs:
      java-version:
        type: string
        required: false
        default: "21"
      java-distribution:
        type: string
        required: false
        default: "temurin"

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          java-version: ${{ inputs.java-version }}
          distribution: ${{ inputs.java-distribution }}

      - name: Set up Maven
        run: |
          sudo apt-get update
          sudo apt-get install -y maven

      - name: Install just
        uses: extractions/setup-just@v3

      - name: Run lint
        run: just lint

  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          java-version: ${{ inputs.java-version }}
          distribution: ${{ inputs.java-distribution }}

      - name: Set up Maven
        run: |
          sudo apt-get update
          sudo apt-get install -y maven

      - name: Install just
        uses: extractions/setup-just@v3

      - name: Run tests
        run: just test

      - name: Upload JaCoCo report
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-report
          path: target/site/jacoco/jacoco.xml
          if-no-files-found: error

      - name: Upload compiled classes
        uses: actions/upload-artifact@v4
        with:
          name: java-classes
          path: target/classes
          if-no-files-found: error
